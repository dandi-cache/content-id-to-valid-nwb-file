name: Refresh

permissions:
  contents: read
  packages: read

on:
  schedule:
    - cron: "0 12 * * *"  # Daily at 12:00 UTC, offset from Update to keep the two apart in time.
  workflow_dispatch:
    inputs:
      limit:
        description: >-
          Optional cap on the number of already-processed content IDs to re-assess in this
          run. Leave blank for the default (~1/30th of the cache per run, so a daily run
          cycles through the whole cache roughly once a month). Set to a large number (e.g.
          the full cache size) for a one-off full re-assessment.
        required: false
        type: number

# Shared with Update: both workflows push to the same `derivatives`/`dist` branches, so they
# must never run concurrently. See update.yml for the full rationale.
concurrency:
  group: dandi-cache-pipeline
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Gate:
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Skip if a refresh already completed while this run was queued
        id: check
        env:
          GH_TOKEN: ${{ secrets._GITHUB_API_KEY }}
        run: |
          CREATED_AT=$(gh run view "${{ github.run_id }}" --repo "${{ github.repository }}" --json createdAt --jq '.createdAt')
          LAST_SUCCESS_AT=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --status success --limit 1 --json updatedAt --jq '.[0].updatedAt // empty')

          # ISO 8601 UTC timestamps compare correctly as strings. A successful run that
          # finished after this run was triggered means this run spent its life queued
          # behind it and would only repeat the same refresh.
          if [ -n "${LAST_SUCCESS_AT}" ] && [ "${LAST_SUCCESS_AT}" \> "${CREATED_AT}" ]; then
            echo "A refresh succeeded at ${LAST_SUCCESS_AT}, after this run was triggered at ${CREATED_AT}; skipping the redundant run."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

  Refresh:
    needs: [ Gate ]
    if: ${{ needs.Gate.outputs.should-run == 'true' }}
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets._GITHUB_API_KEY }}
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install git-annex
        run: |
          sudo apt-get update
          sudo apt-get install -y git-annex

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets._GITHUB_API_KEY }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Run refresh with provenance
        env:
          REPO_URL: https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/${{ github.repository }}.git
          WORKSPACE: ${{ github.workspace }}
          PIPELINE_SCRIPT: refresh.py
          RUN_LABEL: Refresh
          LIMIT: ${{ github.event.inputs.limit || '' }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE: ghcr.io/dandi-cache/content-id-to-valid-nwb-file:latest
        run: bash code/update_pipeline.sh

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Gate, Refresh ]
    if: ${{ always() && failure() }}
    permissions: {}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache: content-id-to-valid-nwb-file refresh"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Cache <dandi-cache@users.noreply.github.com>
          body: "Please check the latest run of the DANDI Cache refresh: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
